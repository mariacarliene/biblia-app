<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitura da Bíblia</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 16px;
  background: #faf7f5;
}
h1 {
  text-align: center;
}
.book {
  border: 1px solid #ddd;
  padding: 10px;
  margin-bottom: 14px;
  background: #fff;
  border-radius: 8px;
}
.book h2 {
  margin: 0 0 8px 0;
}
.chapters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.chapter {
  display: flex;
  align-items: center;
  gap: 4px;
}
#progress {
  text-align: center;
  margin-bottom: 12px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>📖 Leitura da Bíblia</h1>
<div id="progress">Carregando progresso...</div>

<div id="books"></div>

<script>

const livros = [
["Gênesis",50],["Êxodo",40],["Levítico",27],["Números",36],["Deuteronômio",34],
["Josué",24],["Juízes",21],["Rute",4],
["1 Samuel",31],["2 Samuel",24],["1 Reis",22],["2 Reis",25],
["1 Crônicas",29],["2 Crônicas",36],
["Esdras",10],["Neemias",13],["Ester",10],
["Jó",42],["Salmos",150],["Provérbios",31],["Eclesiastes",12],["Cânticos",8],
["Isaías",66],["Jeremias",52],["Lamentações",5],["Ezequiel",48],["Daniel",12],
["Oséias",14],["Joel",3],["Amós",9],["Obadias",1],["Jonas",4],["Miquéias",7],
["Naum",3],["Habacuque",3],["Sofonias",3],["Ageu",2],["Zacarias",14],["Malaquias",4],
["Mateus",28],["Marcos",16],["Lucas",24],["João",21],
["Atos",28],["Romanos",16],["1 Coríntios",16],["2 Coríntios",13],
["Gálatas",6],["Efésios",6],["Filipenses",4],["Colossenses",4],
["1 Tessalonicenses",5],["2 Tessalonicenses",3],
["1 Timóteo",6],["2 Timóteo",4],["Tito",3],["Filemom",1],
["Hebreus",13],["Tiago",5],
["1 Pedro",5],["2 Pedro",3],
["1 João",5],["2 João",1],["3 João",1],
["Judas",1],["Apocalipse",22]
];

const container = document.getElementById("books");

// Criar livros e capítulos
livros.forEach((livro, indexLivro) => {
  const divBook = document.createElement("div");
  divBook.className = "book";

  const titulo = document.createElement("h2");
  titulo.innerText = livro[0];

  const divChapters = document.createElement("div");
  divChapters.className = "chapters";

  for (let i = 1; i <= livro[1]; i++) {
    const label = document.createElement("label");
    label.className = "chapter";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.dataset.id = indexLivro + "-" + i;

    checkbox.addEventListener("change", salvarProgresso);

    label.appendChild(checkbox);
    label.appendChild(document.createTextNode(i));
    divChapters.appendChild(label);
  }

  divBook.appendChild(titulo);
  divBook.appendChild(divChapters);
  container.appendChild(divBook);
});

// Salvar progresso
function salvarProgresso() {
  const checks = document.querySelectorAll("input[type=checkbox]");
  const dados = {};

  checks.forEach(c => {
    dados[c.dataset.id] = c.checked;
  });

  localStorage.setItem("biblia", JSON.stringify(dados));

  atualizarProgresso();
}

// Carregar progresso
function carregarProgresso() {
  const dados = JSON.parse(localStorage.getItem("biblia")) || {};
  const checks = document.querySelectorAll("input[type=checkbox]");

  checks.forEach(c => {
    if (dados[c.dataset.id]) {
      c.checked = true;
    }
  });

  atualizarProgresso();
}

// Atualizar porcentagem
function atualizarProgresso() {
  const checks = document.querySelectorAll("input[type=checkbox]");
  const total = checks.length;
  const marcados = [...checks].filter(c => c.checked).length;

  const porcentagem = Math.round((marcados / total) * 100);

  document.getElementById("progress").innerText =
    `Você leu ${marcados} de ${total} capítulos — ${porcentagem}%`;
}

window.onload = carregarProgresso;

</script>

</body>
</html>
